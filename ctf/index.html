<script>
setTimeout(() => {
    let buffer = "";
    const line = Object.assign(document.createElement("span"), {style: "white-space: pre"});
    const cursor = Object.assign(document.createElement("span"), {
        textContent: "█",
        style: "display:inline-block; width:8px; margin-left:2px;"
    });
    document.body.append(line, cursor, document.createElement("br"));
    setInterval(() => {
        cursor.style.visibility =
            cursor.style.visibility === "hidden" ? "visible" : "hidden";
    }, 800);
    document.addEventListener("keydown", (e) => {
        if (e.key === "Backspace") {
            buffer = buffer.slice(0, -1);
        } 
        else if (e.key.length === 1) {buffer += e.key;}
        else if (e.keyCode === 13 && buffer === "ABOUT") {window.location.replace("https://qu1ck5h0t.github.io/ctf/about");}
        else if (e.keyCode === 13 && buffer === "CRYPTO") {window.location.replace("https://qu1ck5h0t.github.io/ctf/docs");}
        else if (e.keyCode === 13 && buffer === "WRITEUPS") {window.location.replace("https://qu1ck5h0t.github.io/ctf/writeups");}
        else if (e.keyCode === 13 && buffer === "TOOLS") {window.location.replace("https://qu1ck5h0t.github.io/ctf/tools");}
       else if (e.keyCode === 13 && buffer === "BACK") {window.location.replace("https://qu1ck5h0t.github.io/");}
                line.textContent = buffer;
    });
}, 2400);
</script>
